<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perchance AI Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #333; margin-bottom: 20px; }
        input, button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 16px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
        }
        img {
            width: 100%;
            border-radius: 10px;
            margin-top: 20px;
        }
        .loading {
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Perchance AI</h1>
        <p style="text-align:center; color:#666;">Без ключей, без регистрации</p>
        
        <input type="text" id="prompt" placeholder="Например: черный кот" value="черный кот">
        <button onclick="generateImage()">🚀 Создать</button>
        
        <div id="loading" class="loading" style="display:none;">Генерация...</div>
        <img id="result" style="display:none;">
    </div>
    
    <script>
        async function generateImage() {
            const prompt = document.getElementById('prompt').value;
            const loading = document.getElementById('loading');
            const img = document.getElementById('result');
            
            loading.style.display = 'block';
            img.style.display = 'none';
            
            try {
                // Perchance API - публичный, без ключа
                const response = await fetch(`https://image-generation.perchance.org/api/generate?prompt=${encodeURIComponent(prompt)}`);
                const data = await response.json();
                
                if (data.imageUrl) {
                    img.src = data.imageUrl;
                    img.style.display = 'block';
                }
            } catch (e) {
                alert('Ошибка, но Perchance обычно работает');
            }
            
            loading.style.display = 'none';
        }
    </script>
</body>
</html>
