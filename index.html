<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Space Frontier | Cosmic Defense</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', 'Monaco', monospace;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        /* Индикаторы поверх canvas */
        .hud {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            pointer-events: none;
            z-index: 100;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .hud-panel {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            padding: 8px 16px;
            border-radius: 8px;
            border-left: 3px solid #0f0;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .hud-panel span {
            color: #ffaa44;
        }

        .upgrade-menu {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            border-top: 2px solid #ffaa44;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            pointer-events: auto;
            z-index: 200;
            font-family: monospace;
        }

        .upgrade-btn {
            background: #111;
            border: 1px solid #0f0;
            color: #0f0;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .upgrade-btn:hover {
            background: #2a2a2a;
            transform: scale(1.02);
            box-shadow: 0 0 10px #0f0;
        }

        .upgrade-btn:active {
            transform: scale(0.98);
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #000000dd;
            backdrop-filter: blur(12px);
            border: 3px solid red;
            padding: 30px 50px;
            text-align: center;
            z-index: 300;
            border-radius: 30px;
            pointer-events: auto;
            display: none;
            flex-direction: column;
            gap: 20px;
        }

        .game-over h1 {
            color: red;
            font-size: 3rem;
        }

        .restart-btn {
            background: #ffaa44;
            border: none;
            padding: 12px 28px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
        }

        @media (max-width: 700px) {
            .hud-panel { font-size: 0.8rem; padding: 4px 10px; }
            .upgrade-btn { padding: 5px 12px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <div class="hud">
        <div class="hud-panel">❤️ ЗДОРОВЬЕ: <span id="healthVal">100</span></div>
        <div class="hud-panel">⭐ ОЧКИ: <span id="scoreVal">0</span></div>
        <div class="hud-panel">🔫 УРОВЕНЬ: <span id="levelVal">1</span></div>
        <div class="hud-panel">💥 УРОН: <span id="dmgVal">10</span></div>
        <div class="hud-panel">⚡ КРИТ: <span id="critVal">5</span>%</div>
        <div class="hud-panel">💰 МОНЕТЫ: <span id="coinVal">0</span></div>
    </div>

    <div class="upgrade-menu">
        <button class="upgrade-btn" data-upgrade="dmg">➕ Урон +5 (50⭐)</button>
        <button class="upgrade-btn" data-upgrade="crit">🎯 Крит шанс +3% (75⭐)</button>
        <button class="upgrade-btn" data-upgrade="multishot">💢 Двойной выстрел (200⭐)</button>
        <button class="upgrade-btn" data-upgrade="heal">💊 Восстановить 30❤️ (100⭐)</button>
        <button class="upgrade-btn" data-upgrade="coinboost">💰 Удвоение монет (300⭐)</button>
    </div>

    <div class="game-over" id="gameOverDiv">
        <h1>💀 GAME OVER 💀</h1>
        <p style="color:white">Ваша галактика пала. Но вы можете возродиться!</p>
        <button class="restart-btn" id="restartBtn">✨ НОВАЯ ЭПОХА ✨</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        (function(){
            // ------ ПОЛНОЭКРАННЫЙ РЕЖИМ ------
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // ------ ИГРОВЫЕ ПАРАМЕТРЫ ------
            let gameRunning = true;
            let health = 100;
            let score = 0;        // звезды для улучшений
            let coins = 0;        // особая валюта (за волны)
            let wave = 1;
            let enemies = [];
            let bullets = [];
            let particles = [];
            let upgrades = {
                damageBonus: 0,     // доп урон
                critChance: 5,      // базовый 5%
                multishot: false,
                coinMultiplier: 1
            };

            // Параметры игрока
            let player = {
                x: canvas.width/2,
                y: canvas.height - 70,
                radius: 20
            };

            // Настройки волн
            let enemiesToSpawn = 5;
            let enemiesSpawned = 0;
            let spawnCooldown = 0;
            let waveInProgress = true;
            let waveDelay = 0;

            // ------ ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ------
            function updateUI() {
                document.getElementById('healthVal').innerText = Math.floor(health);
                document.getElementById('scoreVal').innerText = Math.floor(score);
                document.getElementById('levelVal').innerText = wave;
                let totalDamage = 10 + upgrades.damageBonus;
                document.getElementById('dmgVal').innerText = totalDamage;
                document.getElementById('critVal').innerText = upgrades.critChance;
                document.getElementById('coinVal').innerText = Math.floor(coins);
            }

            // Спавн врага
            function spawnEnemy() {
                let radius = 15 + Math.floor(Math.random() * 12) + (wave * 0.5);
                radius = Math.min(radius, 45);
                let healthEnemy = 30 + Math.floor(wave * 1.8) + Math.floor(Math.random() * 20);
                let speed = 1.2 + wave * 0.12;
                speed = Math.min(speed, 5.5);
                let color = `hsl(${20 + wave * 5}, 70%, 55%)`;
                enemies.push({
                    x: 20 + Math.random() * (canvas.width - 40),
                    y: -30,
                    radius: radius,
                    health: healthEnemy,
                    maxHealth: healthEnemy,
                    speed: speed,
                    color: color,
                    value: Math.floor(15 + wave * 1.5)
                });
            }

            // Выстрел игрока
            function shoot(targetX, targetY) {
                let dmg = 10 + upgrades.damageBonus;
                let isCrit = Math.random() * 100 < upgrades.critChance;
                let finalDmg = isCrit ? dmg * 2.5 : dmg;
                
                // Эффект крита
                if(isCrit) {
                    for(let i=0;i<8;i++) createParticle(targetX, targetY, '#ffaa44');
                }
                
                bullets.push({
                    x: player.x,
                    y: player.y - 15,
                    targetX: targetX,
                    targetY: targetY,
                    damage: finalDmg,
                    radius: 6,
                    speed: 12,
                    isCrit: isCrit
                });
                
                // Мультивыстрел
                if(upgrades.multishot) {
                    setTimeout(() => {
                        bullets.push({
                            x: player.x - 12,
                            y: player.y - 10,
                            targetX: targetX + (Math.random() - 0.5)*60,
                            targetY: targetY + (Math.random() - 0.5)*40,
                            damage: dmg * 0.8,
                            radius: 5,
                            speed: 11,
                            isCrit: false
                        });
                        bullets.push({
                            x: player.x + 12,
                            y: player.y - 10,
                            targetX: targetX + (Math.random() - 0.5)*60,
                            targetY: targetY + (Math.random() - 0.5)*40,
                            damage: dmg * 0.8,
                            radius: 5,
                            speed: 11,
                            isCrit: false
                        });
                    }, 20);
                }
            }

            function createParticle(x,y,color) {
                particles.push({
                    x: x, y: y, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4,
                    life: 1, color: color, size: 4+Math.random()*5
                });
            }

            // Обновление пуль
            function updateBullets() {
                for(let i=0; i<bullets.length; i++) {
                    let b = bullets[i];
                    let dx = b.targetX - b.x;
                    let dy = b.targetY - b.y;
                    let dist = Math.hypot(dx,dy);
                    if(dist < 5) {
                        // Попадание!
                        let hit = false;
                        for(let e of enemies) {
                            let edist = Math.hypot(b.targetX - e.x, b.targetY - e.y);
                            if(edist < e.radius+10) {
                                e.health -= b.damage;
                                createParticle(b.targetX, b.targetY, b.isCrit ? '#ffaa55' : '#ff8866');
                                hit = true;
                                break;
                            }
                        }
                        bullets.splice(i,1);
                        i--;
                        continue;
                    }
                    let step = Math.min(b.speed, dist);
                    b.x += (dx/dist)*step;
                    b.y += (dy/dist)*step;
                    if(b.y < -100 || b.y > canvas.height+200 || b.x < -200 || b.x > canvas.width+200) {
                        bullets.splice(i,1);
                        i--;
                    }
                }
            }

            // Обновление врагов
            function updateEnemies() {
                for(let i=0; i<enemies.length; i++) {
                    let e = enemies[i];
                    e.y += e.speed;
                    // Достиг базы?
                    if(e.y + e.radius >= canvas.height - 20) {
                        health -= Math.floor(10 + wave*1.2);
                        enemies.splice(i,1);
                        i--;
                        if(health <= 0) gameOver();
                        continue;
                    }
                    if(e.health <= 0) {
                        let reward = Math.floor(e.value);
                        score += reward;
                        coins += Math.floor(reward * 0.3 * upgrades.coinMultiplier);
                        for(let p=0;p<12;p++) createParticle(e.x, e.y, '#ffdd77');
                        enemies.splice(i,1);
                        i--;
                    }
                }
            }

            // Генерация волн
            function updateWaveSystem() {
                if(!gameRunning) return;
                if(waveInProgress) {
                    if(spawnCooldown <= 0 && enemiesSpawned < enemiesToSpawn) {
                        spawnEnemy();
                        enemiesSpawned++;
                        spawnCooldown = 20;
                    } else {
                        if(spawnCooldown > 0) spawnCooldown--;
                    }
                    
                    if(enemies.length === 0 && enemiesSpawned >= enemiesToSpawn) {
                        // Волна пройдена!
                        waveInProgress = false;
                        waveDelay = 80;  // пауза между волнами
                        wave++;
                        let bonus = 100 + wave * 20;
                        score += bonus;
                        coins += 25 * upgrades.coinMultiplier;
                        enemiesToSpawn = Math.min(5 + Math.floor(wave * 0.9), 38);
                        enemiesSpawned = 0;
                        // Восстановление здоровья после волны (немного)
                        health = Math.min(health + 15, 200);
                    }
                } else {
                    if(waveDelay <= 0) {
                        waveInProgress = true;
                        enemiesSpawned = 0;
                        spawnCooldown = 10;
                    } else {
                        waveDelay--;
                    }
                }
            }

            // Апгрейды
            function applyUpgrade(type) {
                if(!gameRunning) return;
                if(type === 'dmg' && score >= 50) {
                    score -= 50;
                    upgrades.damageBonus += 5;
                } else if(type === 'crit' && score >= 75) {
                    score -= 75;
                    upgrades.critChance += 3;
                    if(upgrades.critChance > 70) upgrades.critChance = 70;
                } else if(type === 'multishot' && !upgrades.multishot && score >= 200) {
                    score -= 200;
                    upgrades.multishot = true;
                } else if(type === 'heal' && score >= 100 && health < 180) {
                    score -= 100;
                    health = Math.min(health + 30, 200);
                } else if(type === 'coinboost' && score >= 300 && upgrades.coinMultiplier === 1) {
                    score -= 300;
                    upgrades.coinMultiplier = 2;
                } else {
                    return false;
                }
                updateUI();
                return true;
            }

            function gameOver() {
                gameRunning = false;
                document.getElementById('gameOverDiv').style.display = 'flex';
            }

            function restartGame() {
                gameRunning = true;
                health = 100;
                score = 0;
                coins = 0;
                wave = 1;
                enemies = [];
                bullets = [];
                particles = [];
                upgrades = {
                    damageBonus: 0,
                    critChance: 5,
                    multishot: false,
                    coinMultiplier: 1
                };
                enemiesToSpawn = 5;
                enemiesSpawned = 0;
                waveInProgress = true;
                spawnCooldown = 0;
                waveDelay = 0;
                updateUI();
                document.getElementById('gameOverDiv').style.display = 'none';
            }

            // Обработка кликов по врагам (выстрел)
            function handleShoot(e) {
                if(!gameRunning) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                let mouseX = (e.clientX - rect.left) * scaleX;
                let mouseY = (e.clientY - rect.top) * scaleY;
                shoot(mouseX, mouseY);
            }
            
            canvas.addEventListener('click', handleShoot);
            // также тач для мобильных
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                let touchX = (touch.clientX - rect.left) * scaleX;
                let touchY = (touch.clientY - rect.top) * scaleY;
                shoot(touchX, touchY);
            });
            
            // Апгрейд кнопки
            document.querySelectorAll('.upgrade-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const type = btn.getAttribute('data-upgrade');
                    applyUpgrade(type);
                    updateUI();
                });
            });
            document.getElementById('restartBtn').addEventListener('click', () => restartGame());
            
            // Движение игрока за мышью (полный контроль)
            canvas.addEventListener('mousemove', (e) => {
                if(!gameRunning) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                let mouseX = (e.clientX - rect.left) * scaleX;
                player.x = Math.min(Math.max(mouseX, 35), canvas.width - 35);
            });
            
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if(!gameRunning) return;
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const scaleX = canvas.width / rect.width;
                let touchX = (touch.clientX - rect.left) * scaleX;
                player.x = Math.min(Math.max(touchX, 35), canvas.width - 35);
            });
            
            // ------ ЧАСТИЦЫ ------
            function updateParticles() {
                for(let i=0;i<particles.length;i++) {
                    let p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= 0.03;
                    if(p.life <= 0 || p.y > canvas.height+100 || p.x < -100 || p.x > canvas.width+100) {
                        particles.splice(i,1);
                        i--;
                    }
                }
            }
            
            // ------ ОТРИСОВКА (ВЕСЬ ЭКРАН) ------
            function draw() {
                if(!ctx) return;
                // Звездный фон
                ctx.fillStyle = '#010108';
                ctx.fillRect(0,0,canvas.width,canvas.height);
                for(let i=0;i<150;i++) {
                    if(i%2 === 0) continue;
                    ctx.fillStyle = `rgba(255,255,200,${0.3+Math.sin(Date.now()*0.001+i)*0.2})`;
                    ctx.beginPath();
                    ctx.arc( (i*131)%canvas.width, (i*57)%canvas.height, 1+ (i%3), 0, Math.PI*2);
                    ctx.fill();
                }
                
                // Игрок (космический корабль)
                ctx.shadowBlur = 12;
                ctx.shadowColor = '#0af';
                ctx.fillStyle = '#6cf';
                ctx.beginPath();
                ctx.moveTo(player.x, player.y-25);
                ctx.lineTo(player.x-18, player.y+5);
                ctx.lineTo(player.x-8, player.y+5);
                ctx.lineTo(player.x-8, player.y+18);
                ctx.lineTo(player.x, player.y+12);
                ctx.lineTo(player.x+8, player.y+18);
                ctx.lineTo(player.x+8, player.y+5);
                ctx.lineTo(player.x+18, player.y+5);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(player.x, player.y-12, 6, 0, Math.PI*2);
                ctx.fill();
                
                // Враги
                for(let e of enemies) {
                    ctx.shadowBlur = 6;
                    ctx.fillStyle = e.color;
                    ctx.beginPath();
                    ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.font = "bold 14px monospace";
                    ctx.shadowBlur = 2;
                    ctx.fillText(`${Math.floor(e.health)}`, e.x-15, e.y-8);
                    // полоска здоровья
                    let percent = e.health/e.maxHealth;
                    ctx.fillStyle = '#a00';
                    ctx.fillRect(e.x-e.radius, e.y-e.radius-8, e.radius*2, 5);
                    ctx.fillStyle = '#0f0';
                    ctx.fillRect(e.x-e.radius, e.y-e.radius-8, e.radius*2*percent, 4);
                }
                
                // Пули
                for(let b of bullets) {
                    ctx.shadowBlur = 10;
                    ctx.fillStyle = b.isCrit ? '#ffaa55' : '#ffff88';
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.radius-2, 0, Math.PI*2);
                    ctx.fill();
                }
                
                // Частицы
                for(let p of particles) {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size*p.life, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
                
                // Инфо о волне
                if(!waveInProgress && waveDelay>0) {
                    ctx.font = "bold 26monospace";
                    ctx.fillStyle = "#ffaa44";
                    ctx.shadowBlur = 0;
                    ctx.fillText(`⚡ ВОЛНА ${wave} ПРОЙДЕНА! ⚡`, canvas.width/2-150, canvas.height/2);
                }
                if(enemies.length===0 && waveInProgress && enemiesSpawned>=enemiesToSpawn && waveDelay===0) {
                    ctx.font = "20px monospace";
                    ctx.fillStyle = "cyan";
                    ctx.fillText("➡️ СЛЕДУЮЩАЯ ВОЛНА...", canvas.width/2-130, canvas.height/2);
                }
            }
            
            // Основной цикл
            function gameLoop() {
                if(gameRunning) {
                    updateBullets();
                    updateEnemies();
                    updateWaveSystem();
                    updateParticles();
                    // динамическое обновление интерфейса
                    updateUI();
                    
                    // Ограничение здоровья
                    if(health<=0) gameOver();
                    health = Math.min(health, 200);
                    
                    // Дополнительно: если врагов слишком много - не крашим
                }
                draw();
                requestAnimationFrame(gameLoop);
            }
            
            // Запуск!
            resizeCanvas();
            updateUI();
            gameLoop();
        })();
    </script>
</body>
</html>
